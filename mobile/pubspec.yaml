name: keza_mobile
description: "A mobile app for touring Rwanda digitally"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ----------------------------
  # UI & DESIGN
  # ----------------------------
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.9
  flutter_screenutil: ^5.9.0
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.1
  google_fonts: 6.1.0

  # ----------------------------
  # STATE MANAGEMENT
  # ----------------------------
  provider: ^6.1.1

  # ----------------------------
  # ROUTING
  # ----------------------------
  go_router: ^14.0.0

  # ----------------------------
  # NETWORKING & API
  # ----------------------------
  dio: ^5.4.0
  json_annotation: ^4.8.1

  # ----------------------------
  # DEVICE FEATURES
  # ----------------------------
  permission_handler: ^11.3.0
  url_launcher: ^6.2.5

  # ----------------------------
  # AUTH
  # ----------------------------
  shared_preferences: ^2.2.3
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  flutter_facebook_auth: ^7.1.1
  win32: ^5.9.0

  # ----------------------------
  # UTILITIES
  # ----------------------------
  intl: ^0.19.0
  another_flushbar: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ----------------------------
  # LINTS
  # ----------------------------
  flutter_lints: ^3.0.1

  # ----------------------------
  # CODE GENERATION
  # ----------------------------
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/general/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/general/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/homes/
    - assets/places/
    - assets/general/
    - assets/categories/
    - assets/icons/
